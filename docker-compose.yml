services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hubspot_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 3
        ollama pull ${OLLAMA_MODEL:-llama3}
        wait
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hubspot_bot
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      HUBSPOT_CLIENT_ID: ${HUBSPOT_CLIENT_ID:-}
      HUBSPOT_CLIENT_SECRET: ${HUBSPOT_CLIENT_SECRET:-}
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}
      HUBSPOT_REFRESH_TOKEN: ${HUBSPOT_REFRESH_TOKEN:-}
      HUBSPOT_REDIRECT_URI: ${HUBSPOT_REDIRECT_URI:-http://localhost:3000/oauth/callback}
      BUSINESS_NAME: ${BUSINESS_NAME:-NeoWeb Studio}
      BUSINESS_SERVICES: ${BUSINESS_SERVICES:-Desarrollo web, landing pages, automatización}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - whatsapp_sessions:/app/whatsapp-session
      - ./logs:/app/logs
      - ./whatsapp-qr.txt:/app/whatsapp-qr.txt
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  whatsapp_sessions:
