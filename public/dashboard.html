<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard - Bot IA HubSpot</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px;line-height:1.5}
.top{background:#0f172a;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top h1{font-size:20px;font-weight:600}
.top-right{display:flex;align-items:center;gap:16px;font-size:13px}
.status{display:flex;gap:12px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.status-dot.on{background:#22c55e;box-shadow:0 0 6px #22c55e88}
.status-dot.off{background:#ef4444}
.refresh-btn{background:#1e293b;border:1px solid #334155;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px}
.refresh-btn:hover{background:#334155}
.container{max-width:1400px;margin:0 auto;padding:24px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-num{font-size:28px;font-weight:700;color:#0f172a}
.card-label{font-size:13px;color:#64748b;margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:#fff;border-radius:10px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab{padding:8px 20px;border:none;background:none;cursor:pointer;border-radius:8px;font-size:14px;font-weight:500;color:#64748b;transition:all .15s}
.tab.active{background:#0f172a;color:#fff}
.tab:hover:not(.active){background:#f1f5f9}
.panel{display:none}
.panel.active{display:block}
.table-wrap{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;background:#f8fafc;border-bottom:1px solid #e2e8f0}
td{padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:14px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-whatsapp{background:#22c55e20;color:#16a34a}
.badge-web{background:#3b82f620;color:#2563eb}
.msg-preview{max-width:350px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#475569;font-size:13px}
.clickable{cursor:pointer;color:#2563eb;font-weight:500}
.clickable:hover{text-decoration:underline}
.empty{padding:40px;text-align:center;color:#94a3b8;font-size:15px}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:90%;max-width:700px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:16px;font-weight:600}
.modal-close{width:32px;height:32px;border:none;background:#f1f5f9;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e2e8f0}
.modal-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word}
.chat-msg.user{align-self:flex-end;background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.chat-msg.assistant{align-self:flex-start;background:#f1f5f9;color:#1e293b;border-bottom-left-radius:4px}
.chat-msg .time{font-size:10px;opacity:.6;margin-top:4px}
.chat-msg.user .time{text-align:right}
.chat-msg.assistant .time{text-align:left}
.modal-info{padding:12px 20px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:13px;display:flex;gap:20px;flex-wrap:wrap}
.modal-info span{color:#64748b}
.modal-info strong{color:#1e293b}
@media(max-width:768px){
  .top{flex-direction:column;gap:12px;padding:12px 16px}
  .top-right{flex-wrap:wrap}
  .container{padding:12px}
  .cards{grid-template-columns:repeat(2,1fr)}
  .table-wrap{overflow-x:auto}
}
</style>
</head>
<body>

<div class="top">
  <h1>Bot IA Dashboard</h1>
  <div class="top-right">
    <div class="status" id="status">
      <span><span class="status-dot" id="dot-ollama"></span>Ollama</span>
      <span><span class="status-dot" id="dot-db"></span>DB</span>
    </div>
    <span id="last-update" style="color:#94a3b8">---</span>
    <button class="refresh-btn" id="refreshBtn">Actualizar</button>
  </div>
</div>

<div class="container">
  <div class="cards" id="stats">
    <div class="card"><div class="card-num" id="stat-sessions">-</div><div class="card-label">Total Conversaciones</div></div>
    <div class="card"><div class="card-num" id="stat-active">-</div><div class="card-label">Activas</div></div>
    <div class="card"><div class="card-num" id="stat-leads">-</div><div class="card-label">Leads Capturados</div></div>
    <div class="card"><div class="card-num" id="stat-24h">-</div><div class="card-label">Mensajes (24h)</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="conversations">Conversaciones</button>
    <button class="tab" data-tab="leads">Leads</button>
  </div>

  <div class="panel active" id="panel-conversations">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Canal</th><th>Contacto</th><th>Último mensaje</th><th>Mensajes</th><th>Última actividad</th></tr></thead>
        <tbody id="conv-tbody"><tr><td colspan="5" class="empty">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="panel" id="panel-leads">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nombre</th><th>Email</th><th>Teléfono</th><th>HubSpot ID</th><th>Última interacción</th></tr></thead>
        <tbody id="leads-tbody"><tr><td colspan="5" class="empty">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header"><h2>Conversación</h2><button class="modal-close" id="modalClose">✕</button></div>
    <div class="modal-info" id="modalInfo"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const POLL_INTERVAL = 5000;
let pollTimer;

function $(id) { return document.getElementById(id); }

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(res.statusText);
  return res.json();
}

function formatTime(d) {
  const date = new Date(d);
  const now = new Date();
  const diff = now - date;
  if (diff < 60000) return 'Ahora';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h';
  return date.toLocaleDateString('es-ES', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function renderConversations(convs) {
  const tb = $('conv-tbody');
  if (!convs || convs.length === 0) { tb.innerHTML = '<tr><td colspan="5" class="empty">Sin conversaciones activas</td></tr>'; return; }
  tb.innerHTML = convs.map(c => {
    const channelBadge = c.channel === 'whatsapp' ? '<span class="badge badge-whatsapp">WhatsApp</span>' : '<span class="badge badge-web">Web</span>';
    const contact = c.phone || c.contact_id || 'Anónimo';
    return `<tr><td>${channelBadge}</td>
      <td class="clickable" onclick="openConversation('${c.id}')">${esc(contact)}</td>
      <td><div class="msg-preview">${esc(c.last_message || '—')}</div></td>
      <td>${c.message_count || 0}</td>
      <td>${formatTime(c.updated_at)}</td></tr>`;
  }).join('');
}

function renderLeads(leads) {
  const tb = $('leads-tbody');
  if (!leads || leads.length === 0) { tb.innerHTML = '<tr><td colspan="5" class="empty">Sin leads capturados</td></tr>'; return; }
  tb.innerHTML = leads.map(l => `<tr>
    <td><strong>${esc(l.name) || '—'}</strong></td>
    <td>${esc(l.email) || '—'}</td>
    <td>${esc(l.phone) || '—'}</td>
    <td style="font-size:12px;color:#64748b">${esc(l.hubspot_id) || '—'}</td>
    <td>${l.last_interaction ? formatTime(l.last_interaction) : '—'}</td>
  </tr>`).join('');
}

function renderStats(stats) {
  if (!stats) return;
  $('stat-sessions').textContent = stats.total_sessions || 0;
  $('stat-active').textContent = stats.active_sessions || 0;
  $('stat-leads').textContent = stats.total_leads || 0;
  $('stat-24h').textContent = stats.messages_24h || 0;
}

function updateStatus(ollama, db) {
  $('dot-ollama').className = 'status-dot ' + (ollama ? 'on' : 'off');
  $('dot-db').className = 'status-dot ' + (db ? 'on' : 'off');
}

async function loadAll() {
  try {
    const [stats, convs, leads] = await Promise.all([
      fetchJSON('/api/dashboard/stats'),
      fetchJSON('/api/dashboard/conversations'),
      fetchJSON('/api/dashboard/leads'),
    ]);
    renderStats(stats);
    renderConversations(convs);
    renderLeads(leads);
    updateStatus(true, true);
  } catch (e) {
    updateStatus(false, false);
  }
  $('last-update').textContent = new Date().toLocaleTimeString('es-ES');
}

async function openConversation(id) {
  try {
    const data = await fetchJSON('/api/dashboard/conversations/' + id);
    const s = data.session;
    $('modalInfo').innerHTML =
      '<span><strong>Canal:</strong> ' + (s.channel||'—') + '</span>' +
      '<span><strong>Teléfono:</strong> ' + (s.phone||'—') + '</span>' +
      '<span><strong>ID:</strong> ' + s.id.substring(0,8) + '...</span>';
    $('modalBody').innerHTML = data.messages.map(m =>
      '<div class="chat-msg ' + m.role + '"><div>' + esc(m.content) + '</div><div class="time">' + formatTime(m.created_at) + '</div></div>'
    ).join('');
    $('modal').classList.add('open');
  } catch (e) {
    alert('Error al cargar conversación');
  }
}

$('modalClose').onclick = () => $('modal').classList.remove('open');
$('modal').onclick = (e) => { if (e.target === $('modal')) $('modal').classList.remove('open'); };

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    $('panel-' + tab.dataset.tab).classList.add('active');
  };
});

$('refreshBtn').onclick = loadAll;

loadAll();
pollTimer = setInterval(loadAll, POLL_INTERVAL);
</script>
</body>
</html>
